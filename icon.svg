  <!-- dumplings -->
  <circle cx="200" cy="300" r="34" fill="#fff8ea"/>
  <circle cx="256" cy="318" r="38" fill="#fff8ea"/>
  <circle cx="312" cy="300" r="34" fill="#fff8ea"/>
